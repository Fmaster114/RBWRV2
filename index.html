<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBWR V2.0 | LIVE</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-shadow: 0 0 10px #00ff41;
        }
        .container {
            border: 2px solid #00ff41;
            padding: 50px;
            background: rgba(0, 255, 65, 0.05);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
            text-align: center;
        }
        h1 { font-size: 1.8rem; margin: 0 0 20px 0; letter-spacing: 4px; }
        #timer { font-size: 6.5rem; font-weight: bold; font-variant-numeric: tabular-nums; }
        .location { margin-top: 15px; color: #008f11; font-size: 0.9rem; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>RBWR V2.0 DEPLOYMENT</h1>
        <div id="timer">00:00:00</div>
        <p class="location">STATION: SAARBRÜCKEN | TARGET: 20:00 (8:00 PM)</p>
    </div>

    <script>
        function update() {
            const now = new Date();
            
            // TARGET SET TO 20:00 (8:00 PM)
            const target = new Date();
            target.setHours(20, 0, 0, 0); 

            const diff = target - now;

            if (diff <= 0) {
                document.getElementById("timer").innerHTML = "00:00:00";
                document.querySelector("h1").innerHTML = "SYSTEMS ONLINE";
                return;
            }

            const h = Math.floor(diff / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("timer").innerHTML = 
                `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
