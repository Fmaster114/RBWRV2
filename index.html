<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBWR V2.0 Countdown</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            border: 2px solid #00ff41;
            padding: 40px;
            text-align: center;
            background: rgba(0, 255, 65, 0.05);
            box-shadow: 0 0 20px #00ff41;
        }
        h1 { letter-spacing: 5px; margin-bottom: 20px; }
        #timer { font-size: 5rem; font-weight: bold; }
        .footer { margin-top: 20px; color: #008f11; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="box">
        <h1>RBWR V2.0 UPDATE</h1>
        <div id="timer">00:00:00</div>
        <p class="footer">TARGET TIME: 21:00 (9:00 PM)</p>
    </div>

    <script>
        function updateTimer() {
            const now = new Date();
            
            // Create a target for 9:00 PM TODAY
            const target = new Date();
            target.setHours(21, 0, 0, 0);

            // If it's already past 9 PM, it shows 00:00:00
            let diff = target - now;

            if (diff <= 0) {
                document.getElementById("timer").innerHTML = "00:00:00";
                document.querySelector("h1").innerHTML = "UPDATE RELEASED";
                return;
            }

            const h = Math.floor(diff / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("timer").innerHTML = 
                `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        // Update every 1 second
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
