<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBWR V2.0 | LIVE COUNTDOWN</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .monitor {
            border: 2px solid #00ff41;
            padding: 50px;
            background: rgba(0, 255, 65, 0.05);
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.3);
            text-align: center;
            width: 80%;
            max-width: 600px;
        }
        h1 { font-size: 1.8rem; letter-spacing: 5px; margin: 0; }
        #timer { 
            font-size: 5.5rem; 
            font-weight: bold; 
            margin: 30px 0;
            text-shadow: 0 0 20px #00ff41;
        }
        .status { font-size: 1.1rem; color: #008f11; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="monitor">
        <h1>RBWR V2.0 DEPLOYMENT</h1>
        <div id="timer">00:00:00</div>
        <div class="status">>> CONNECTED TO CENTRAL CORE...</div>
    </div>

    <script>
        // TARGET TIME: 21:00:00 German Time (CET) today.
        // This is a fixed timestamp so it is "Live" for everyone.
        const targetTimestamp = 1741896000000; 

        function updateLiveTimer() {
            const now = Date.now();
            const diff = targetTimestamp - now;

            if (diff <= 0) {
                document.getElementById("timer").innerHTML = "00:00:00";
                document.querySelector("h1").innerHTML = "V2.0 IS LIVE";
                document.querySelector(".status").innerHTML = "SYSTEMS OPERATIONAL";
                return;
            }

            const h = Math.floor(diff / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("timer").innerHTML = 
                `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        // Run every second
        setInterval(updateLiveTimer, 1000);
        updateLiveTimer();
    </script>
</body>
</html>
